<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>声音克隆与文案配音</title>
  <style>
    :root { color-scheme: dark; font-family: "Microsoft YaHei", "Noto Sans SC", system-ui, sans-serif; background: #111417; color: #eef2f6; }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 28px; background: #111417; }
    main { max-width: 1080px; margin: 0 auto; display: grid; gap: 18px; }
    header { display: grid; gap: 8px; }
    h1, h2 { margin: 0; line-height: 1.25; }
    h1 { font-size: 30px; }
    h2 { font-size: 21px; }
    p { margin: 0; color: #b9c4cf; line-height: 1.7; }
    section { border: 1px solid #2f3942; border-radius: 8px; background: #171c21; padding: 20px; display: grid; gap: 14px; }
    .grid { display: grid; gap: 14px; }
    .two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    @media (max-width: 820px) { body { padding: 16px; } .two { grid-template-columns: 1fr; } }
    label { display: grid; gap: 8px; color: #cfd8e3; font-weight: 700; }
    textarea, input, select {
      width: 100%; border: 1px solid #3b4650; border-radius: 6px; background: #0f1317; color: #eef2f6;
      padding: 11px 12px; font-size: 15px; line-height: 1.6; font-family: inherit;
    }
    textarea { min-height: 128px; resize: vertical; }
    input::placeholder, textarea::placeholder { color: #75808c; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    button { border: 0; border-radius: 6px; background: #2f7df6; color: white; padding: 10px 14px; font-size: 15px; cursor: pointer; font-weight: 700; min-height: 40px; }
    button.secondary { background: #34404b; }
    button.success { background: #1d8f72; }
    button.warning { background: #9c6b1f; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    audio { display: block; width: 100%; margin-top: 2px; }
    pre { white-space: pre-wrap; min-height: 96px; margin: 0; color: #d7dee6; line-height: 1.6; }
    .note { color: #9fb0c0; font-size: 14px; }
    .pill { display: inline-flex; align-items: center; width: max-content; min-height: 28px; border: 1px solid #3b4650; border-radius: 999px; padding: 4px 10px; color: #b9c4cf; background: #10151a; font-size: 13px; }
  </style>
</head>
<body>
  <main>
    <header>
      <span class="pill">Voicebox 本地页面</span>
      <h1>声音克隆与文案配音</h1>
      <p>长文案会自动拆成小段逐段生成，最后合并成一个音频文件。</p>
    </header>

    <section>
      <h2>1. 录音克隆</h2>
      <label>新音色名称<input id="voiceNameInput" type="text" placeholder="例如：我的音色V1" /></label>
      <label>录音参考文本<textarea id="referenceText">你好，这是一次声音克隆测试。请尽量在安静环境中清晰朗读，不要有背景音乐，也不要有其他人说话。这段声音会作为参考样本，用来生成新的测试音频。</textarea></label>
      <label>本地音频文件<input id="sampleFileInput" type="file" accept="audio/*,.wav,.mp3,.m4a,.flac,.ogg,.webm,.aac,.opus" /></label>
      <p class="note">可以直接选择本地音频作为克隆样本；也可以不用文件，点击下面按钮现场录音。</p>
      <div class="actions">
        <button id="recordBtn">开始录音</button>
        <button id="stopBtn" class="secondary" disabled>停止录音</button>
        <button id="uploadBtn" disabled>上传为新克隆音色</button>
      </div>
      <audio id="recordingAudio" controls></audio>
    </section>

    <section>
      <h2>2. 生成克隆测试音频</h2>
      <label>测试文案<textarea id="testText">你好，这是我的声音克隆测试。如果效果可以，就能把文案直接生成口播音频。</textarea></label>
      <div class="actions">
        <button id="generateBtn" disabled>生成测试音频</button>
        <button id="saveNameBtn" class="secondary" disabled>保存音色名称</button>
        <button id="useCurrentBtn" class="success" disabled>保存并使用这个音色</button>
      </div>
      <audio id="generatedAudio" controls></audio>
    </section>

    <section>
      <h2>3. 用已有克隆音色生成文案音频</h2>
      <div class="grid two">
        <label>选择已有音色<select id="scriptVoiceSelect"></select></label>
        <label>生成引擎<select id="engineSelect"><option value="qwen">Qwen3-TTS</option></select></label>
      </div>
      <label>文案输入<textarea id="scriptText" placeholder="把要生成口播的文案粘贴到这里。超过 800 字会自动分段。"></textarea></label>
      <label class="note" style="display:flex; grid-gap:8px; gap:8px; align-items:center; font-weight:400;">
        <input id="smartMixToggle" type="checkbox" style="width:auto;" />
        自动语气组合：开头用提问引导/反常识，中段用强调观点/轻松聊天，结尾用收束总结。
      </label>
      <div class="actions">
        <button id="scriptGenerateBtn" disabled>用选中音色生成音频</button>
        <button id="refreshBtn" class="secondary">刷新音色列表</button>
        <button id="useExistingBtn" class="success" disabled>设为默认音色</button>
      </div>
      <audio id="scriptAudio" controls></audio>
    </section>

    <section>
      <h2>4. AI 修声</h2>
      <div class="grid two">
        <label>修声风格<select id="voiceFixPresetSelect">
          <option value="podcast">口播清晰</option>
          <option value="bright">明亮靠前</option>
          <option value="warm">温暖厚一点</option>
          <option value="deep">低沉一点</option>
        </select></label>
        <label class="note" style="display:flex; grid-gap:8px; gap:8px; align-items:center; font-weight:400; padding-top:28px;">
          <input id="autoVoiceFixToggle" type="checkbox" style="width:auto;" checked />
          生成时自动修声
        </label>
      </div>
      <p class="note">修声会做口播后期处理：削掉浑浊低频、压稳响度、适当提高音量；不是重新训练音色。</p>
      <div class="actions">
        <button id="voiceFixBtn" class="success" disabled>修最近单段音频</button>
      </div>
    </section>

    <section>
      <h2>5. 保存最近生成的音频</h2>
      <div class="grid two">
        <label>保存目录或完整文件路径<input id="outputPathInput" type="text" placeholder="留空则保存到本页面 outputs 目录" /></label>
        <label>文件名<input id="outputFilenameInput" type="text" placeholder="voicebox-output.wav" /></label>
      </div>
      <p class="note">如果左侧填写目录，会使用右侧文件名；如果填写完整 .wav 文件路径，会直接保存为该文件。已有同名文件会自动加序号。</p>
      <div class="actions">
        <button id="saveAudioBtn" class="warning" disabled>保存音频到路径</button>
        <button id="downloadAudioBtn" class="secondary" disabled>浏览器下载</button>
      </div>
    </section>

    <section>
      <h2>状态</h2>
      <pre id="status">正在检测 Voicebox 服务...</pre>
    </section>
  </main>

  <script>
    const API = "http://127.0.0.1:3847/api/voicebox";
    const CHUNK_CHAR_LIMIT = 220;
    let recorder = null;
    let chunks = [];
    let recordedBlob = null;
    let sampleFilename = "voice_sample.webm";
    let currentProfile = null;
    let voiceProfiles = [];
    let latestGenerationId = null;
    let latestCombinedPath = "";
    let latestAudioUrl = "";
    let latestAudioElement = null;

    const $ = (id) => document.getElementById(id);
    const status = (text) => { $("status").textContent = text; };
    const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

    $("outputPathInput").value = localStorage.getItem("voiceboxOutputPath") || "";
    $("outputFilenameInput").value = defaultAudioFilename();

    function pad(n) { return String(n).padStart(2, "0"); }

    function defaultVoiceName() {
      const now = new Date();
      return `我的音色-${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}`;
    }

    function defaultAudioFilename(prefix = "voicebox") {
      const now = new Date();
      return `${prefix}-${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}.wav`;
    }

    function splitTextForTts(text, limit = CHUNK_CHAR_LIMIT) {
      const normalized = text.replace(/\r\n/g, "\n").trim();
      if (normalized.length <= limit) return normalized ? [normalized] : [];
      const units = normalized
        .split(/(?<=[。！？!?；;])\s*|\n+/)
        .map((item) => item.trim())
        .filter(Boolean);
      const result = [];
      let current = "";
      for (const unit of units) {
        if (unit.length > limit) {
          if (current) result.push(current);
          current = "";
          for (let i = 0; i < unit.length; i += limit) result.push(unit.slice(i, i + limit));
          continue;
        }
        if ((current + unit).length > limit && current) {
          result.push(current);
          current = unit;
        } else {
          current = current ? `${current}\n${unit}` : unit;
        }
      }
      if (current) result.push(current);
      return result;
    }

    function setLatestGeneratedAudio(generationId, audioElement) {
      latestGenerationId = generationId;
      latestCombinedPath = "";
      latestAudioUrl = `${API}/audio-normalized/${generationId}`;
      latestAudioElement = audioElement;
      audioElement.src = latestAudioUrl;
      $("outputFilenameInput").value = defaultAudioFilename();
      $("saveAudioBtn").disabled = false;
      $("downloadAudioBtn").disabled = false;
      $("voiceFixBtn").disabled = false;
    }

    function setLatestCombinedAudio(result, audioElement) {
      latestGenerationId = null;
      latestCombinedPath = result.saved_path;
      latestAudioUrl = new URL(result.audio_url, window.location.origin).href;
      latestAudioElement = audioElement;
      audioElement.src = latestAudioUrl;
      $("outputFilenameInput").value = result.filename || defaultAudioFilename("voicebox-combined");
      $("saveAudioBtn").disabled = false;
      $("downloadAudioBtn").disabled = false;
      $("voiceFixBtn").disabled = true;
    }

    async function fetchJson(url, options = {}) {
      const resp = await fetch(url, options);
      if (!resp.ok) throw new Error(await resp.text());
      return resp.json();
    }

    function voiceFixChain(preset = $("voiceFixPresetSelect").value) {
      const chains = {
        podcast: [
          { type: "highpass", enabled: true, params: { cutoff_frequency_hz: 85 } },
          { type: "lowpass", enabled: true, params: { cutoff_frequency_hz: 10500 } },
          { type: "compressor", enabled: true, params: { threshold_db: -18, ratio: 3, attack_ms: 6, release_ms: 120 } },
          { type: "gain", enabled: true, params: { gain_db: 1 } },
        ],
        bright: [
          { type: "highpass", enabled: true, params: { cutoff_frequency_hz: 120 } },
          { type: "lowpass", enabled: true, params: { cutoff_frequency_hz: 11000 } },
          { type: "compressor", enabled: true, params: { threshold_db: -20, ratio: 3.5, attack_ms: 4, release_ms: 90 } },
          { type: "gain", enabled: true, params: { gain_db: 1 } },
        ],
        warm: [
          { type: "highpass", enabled: true, params: { cutoff_frequency_hz: 70 } },
          { type: "lowpass", enabled: true, params: { cutoff_frequency_hz: 8500 } },
          { type: "compressor", enabled: true, params: { threshold_db: -19, ratio: 2.5, attack_ms: 8, release_ms: 150 } },
          { type: "gain", enabled: true, params: { gain_db: 1 } },
        ],
        deep: [
          { type: "pitch_shift", enabled: true, params: { semitones: -1.5 } },
          { type: "highpass", enabled: true, params: { cutoff_frequency_hz: 65 } },
          { type: "lowpass", enabled: true, params: { cutoff_frequency_hz: 8000 } },
          { type: "compressor", enabled: true, params: { threshold_db: -18, ratio: 2.8, attack_ms: 8, release_ms: 150 } },
          { type: "gain", enabled: true, params: { gain_db: 1 } },
        ],
      };
      return chains[preset] || chains.podcast;
    }

    async function applyVoiceFixToLatest() {
      if (!latestGenerationId || latestCombinedPath) throw new Error("最近音频是合并文件，不能单独后期。请打开“生成时自动修声”后重新生成长文案。");
      const version = await fetchJson(`${API}/generations/${latestGenerationId}/versions/apply-effects`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          label: `ai-fix-${$("voiceFixPresetSelect").value}`,
          set_as_default: true,
          effects_chain: voiceFixChain(),
        }),
      });
      latestAudioUrl = `${API}/audio-normalized/${latestGenerationId}?t=${Date.now()}`;
      if (latestAudioElement) {
        latestAudioElement.src = latestAudioUrl;
        latestAudioElement.play().catch(() => {});
      }
      $("outputFilenameInput").value = defaultAudioFilename("voicebox-fixed");
      return version;
    }

    async function createDraftProfile() {
      const name = $("voiceNameInput").value.trim() || defaultVoiceName();
      $("voiceNameInput").value = name;
      return fetchJson(`${API}/profiles`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, description: "Recorded from local browser page", language: "zh", voice_type: "cloned", default_engine: "qwen" }),
      });
    }

    function renderProfileOptions(profiles, selectedId) {
      voiceProfiles = profiles;
      const select = $("scriptVoiceSelect");
      select.innerHTML = "";
      for (const profile of profiles) {
        const option = document.createElement("option");
        option.value = profile.id;
        option.textContent = `${profile.name}（样本 ${profile.sample_count}）`;
        select.appendChild(option);
      }
      if (selectedId && [...select.options].some((item) => item.value === selectedId)) select.value = selectedId;
      $("scriptGenerateBtn").disabled = profiles.length === 0;
      $("useExistingBtn").disabled = profiles.length === 0;
    }

    function textForProfile(profile) {
      return `${profile.name || ""} ${profile.description || ""} ${profile.personality || ""}`.toLowerCase();
    }

    function findProfileByKeywords(keywordGroups) {
      for (const keywords of keywordGroups) {
        const found = voiceProfiles.find((profile) => {
          const text = textForProfile(profile);
          return keywords.every((keyword) => text.includes(keyword));
        });
        if (found) return found;
      }
      return null;
    }

    function resolveStyleProfile(style, fallbackProfileId) {
      const fallback = voiceProfiles.find((profile) => profile.id === fallbackProfileId) || voiceProfiles[0] || null;
      const profiles = {
        question: findProfileByKeywords([["提问"], ["引导"]]),
        counter: findProfileByKeywords([["反常识"], ["反转"]]),
        summary: findProfileByKeywords([["收束"], ["总结"], ["结尾"]]),
        chat: findProfileByKeywords([["轻松"], ["聊天"], ["过渡"]]),
        natural: findProfileByKeywords([["自然"], ["讲解"], ["解释"]]),
        emphasis: findProfileByKeywords([["强调"], ["观点"]]),
      };
      if (style === "middle") return profiles.chat || profiles.emphasis || fallback;
      return profiles[style] || fallback;
    }

    function splitTextForSmartMix(text) {
      const normalized = text.replace(/\r\n/g, "\n").trim();
      if (!normalized) return [];
      const paragraphs = normalized.split(/\n{2,}/).map((item) => item.trim()).filter(Boolean);
      if (paragraphs.length >= 3) return paragraphs;
      return splitTextForTts(normalized, 180);
    }

    function classifySmartSegment(text, index, total) {
      const normalized = text.trim();
      if (index === total - 1 && total > 1) return "summary";
      if (index === 0) {
        if (/反常识|很多人以为|你以为|其实|不是.+而是/.test(normalized)) return "counter";
        if (/？|\?|有没有|为什么|你觉得|你会不会|你有没有|如果/.test(normalized)) return "question";
        return "question";
      }
      if (/反常识|很多人以为|你以为|其实/.test(normalized)) return "counter";
      if (/我一定要强调|重点|关键|直接一点/.test(normalized)) return "emphasis";
      return "middle";
    }

    async function generateSmartMix({ text, engine, audioElement, fallbackProfileId }) {
      if (!text.trim()) throw new Error("请先填写文案。");
      if (!voiceProfiles.length) throw new Error("请先刷新并选择至少一个音色。");
      const sections = splitTextForSmartMix(text);
      const ids = [];
      const plan = sections.map((section, index) => {
        const style = classifySmartSegment(section, index, sections.length);
        const profile = resolveStyleProfile(style, fallbackProfileId);
        if (!profile) throw new Error("没有可用音色。");
        return { section, style, profile };
      });
      status(`自动语气组合已规划 ${plan.length} 段：\n${plan.map((item, i) => `${i + 1}. ${item.style} -> ${item.profile.name}`).join("\n")}`);
      for (let i = 0; i < plan.length; i += 1) {
        const item = plan[i];
        const generation = await submitGeneration(item.profile.id, item.section, engine);
        ids.push(generation.id);
        await pollGeneration(
          generation.id,
          "正在按自动语气组合生成...",
          `\n分段：${i + 1}/${plan.length}\n语气：${item.style}\n音色：${item.profile.name}\n本段 ${item.section.length} 字`,
        );
      }
      const combined = await fetchJson(`${API}/concat-audio`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ generation_ids: ids, filename: defaultAudioFilename("voicebox-style-mix") }),
      });
      setLatestCombinedAudio(combined, audioElement);
      audioElement.play().catch(() => {});
      status(`自动语气组合生成完成。\n${plan.map((item, i) => `${i + 1}. ${item.style} -> ${item.profile.name}`).join("\n")}\n合并文件：${combined.saved_path}`);
    }

    async function refreshVoiceLibrary() {
      try {
        const data = await fetchJson(`${API}/status`);
        const profiles = data.profiles || [];
        renderProfileOptions(profiles, data.selected_profile_id);
        if (!data.service_running) {
          status(`Voicebox 服务未运行。\n请先运行 scripts/start.ps1。\n${data.error || ""}`);
          return;
        }
        status(profiles.length ? `已检测到 ${profiles.length} 个可用克隆音色。` : "还没有已保存音色。请先录音、上传并生成测试。");
      } catch (error) {
        status(`读取音色列表失败：${error.message}`);
      }
    }

    async function updateCurrentProfileName() {
      if (!currentProfile) throw new Error("还没有当前音色。请先上传录音样本。");
      const name = $("voiceNameInput").value.trim();
      if (!name) throw new Error("请先填写音色名称。");
      currentProfile = await fetchJson(`${API}/profiles/${currentProfile.id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          name,
          description: currentProfile.description || "Recorded from local browser page",
          language: currentProfile.language || "zh",
          voice_type: currentProfile.voice_type || "cloned",
          preset_engine: currentProfile.preset_engine || null,
          preset_voice_id: currentProfile.preset_voice_id || null,
          design_prompt: currentProfile.design_prompt || null,
          default_engine: currentProfile.default_engine || "qwen",
          personality: currentProfile.personality || null,
        }),
      });
      await refreshVoiceLibrary();
      return currentProfile;
    }

    async function selectVoice(profileId) {
      const result = await fetchJson(`${API}/select`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ profile_id: profileId }),
      });
      status(`已设为默认音色：${result.selected_profile_name}`);
    }

    async function pollGeneration(generationId, label, chunkInfo = "") {
      const maxPolls = 360;
      for (let i = 0; i < maxPolls; i += 1) {
        const item = await fetchJson(`${API}/history/${generationId}`);
        const elapsedMinutes = Math.floor((i * 5) / 60);
        status(`${label}${chunkInfo}\n任务：${generationId}\n状态：${item.status}\n已等待：约 ${elapsedMinutes} 分钟\n音频时长：${item.duration || 0}\n错误：${item.error || ""}`);
        if (item.status === "completed") return item;
        if (item.status === "failed" || item.status === "cancelled") throw new Error(item.error || `生成终止：${item.status}`);
        await sleep(5000);
      }
      throw new Error(`单段等待超时。任务 ID：${generationId}`);
    }

    async function submitGeneration(profileId, text, engine) {
      const body = {
        profile_id: profileId,
        text: text.trim(),
        language: "zh",
        engine,
        model_size: "0.6B",
        seed: Math.floor(Date.now() / 1000),
        max_chunk_chars: 180,
        crossfade_ms: 50,
        normalize: true,
      };
      if ($("autoVoiceFixToggle").checked) body.effects_chain = voiceFixChain();
      return fetchJson(`${API}/generate`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
    }

    async function generateSpeech({ profileId, text, engine, audioElement, label, allowSplit = false }) {
      if (!profileId) throw new Error("请先选择音色。");
      if (!text.trim()) throw new Error("请先填写文案。");
      const textChunks = allowSplit ? splitTextForTts(text) : [text.trim()];
      if (textChunks.length === 1) {
        const generation = await submitGeneration(profileId, textChunks[0], engine);
        status(`${label}\n生成任务已提交：${generation.id}`);
        await pollGeneration(generation.id, label);
        setLatestGeneratedAudio(generation.id, audioElement);
        audioElement.play().catch(() => {});
        status(`${label}\n生成完成。可以试听，也可以保存到指定路径。`);
        return;
      }

      const ids = [];
      status(`${label}\n文案较长，已自动拆成 ${textChunks.length} 段，将逐段生成后合并。`);
      for (let i = 0; i < textChunks.length; i += 1) {
        const generation = await submitGeneration(profileId, textChunks[i], engine);
        ids.push(generation.id);
        await pollGeneration(generation.id, label, `\n分段：${i + 1}/${textChunks.length}，本段 ${textChunks[i].length} 字`);
      }
      const combined = await fetchJson(`${API}/concat-audio`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ generation_ids: ids, filename: defaultAudioFilename("voicebox-combined") }),
      });
      setLatestCombinedAudio(combined, audioElement);
      audioElement.play().catch(() => {});
      status(`${label}\n${textChunks.length} 段已全部生成并合并。\n合并文件：${combined.saved_path}`);
    }

    $("recordBtn").onclick = async () => {
      try {
        chunks = [];
        recordedBlob = null;
        sampleFilename = "voice_sample.webm";
        currentProfile = null;
        $("generateBtn").disabled = true;
        $("saveNameBtn").disabled = true;
        $("useCurrentBtn").disabled = true;
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recorder = new MediaRecorder(stream);
        recorder.ondataavailable = (event) => { if (event.data.size > 0) chunks.push(event.data); };
        recorder.onstop = () => {
          recordedBlob = new Blob(chunks, { type: recorder.mimeType || "audio/webm" });
          sampleFilename = "voice_sample.webm";
          $("recordingAudio").src = URL.createObjectURL(recordedBlob);
          $("uploadBtn").disabled = false;
          stream.getTracks().forEach((track) => track.stop());
          status(`录音完成，大小 ${(recordedBlob.size / 1024 / 1024).toFixed(2)} MB。\n先播放检查，没问题就上传。`);
        };
        recorder.start();
        $("recordBtn").disabled = true;
        $("stopBtn").disabled = false;
        $("uploadBtn").disabled = true;
        if (!$("voiceNameInput").value.trim()) $("voiceNameInput").value = defaultVoiceName();
        status("正在录音，请朗读参考文本。");
      } catch (error) {
        status(`无法开始录音：${error.message}\n如果浏览器拦截了麦克风，请允许当前页面使用麦克风。`);
      }
    };

    $("stopBtn").onclick = () => {
      if (recorder && recorder.state === "recording") recorder.stop();
      $("recordBtn").disabled = false;
      $("stopBtn").disabled = true;
    };

    $("sampleFileInput").onchange = () => {
      const file = $("sampleFileInput").files && $("sampleFileInput").files[0];
      if (!file) return;
      recordedBlob = file;
      sampleFilename = file.name || "voice_sample.wav";
      currentProfile = null;
      $("recordingAudio").src = URL.createObjectURL(file);
      $("uploadBtn").disabled = false;
      $("generateBtn").disabled = true;
      $("saveNameBtn").disabled = true;
      $("useCurrentBtn").disabled = true;
      if (!$("voiceNameInput").value.trim()) $("voiceNameInput").value = defaultVoiceName();
      status(`已选择本地音频：${sampleFilename}\n大小 ${(file.size / 1024 / 1024).toFixed(2)} MB。\n请确认参考文本与音频内容尽量一致，然后上传为新克隆音色。`);
    };

    $("uploadBtn").onclick = async () => {
      if (!recordedBlob) return;
      $("uploadBtn").disabled = true;
      $("generateBtn").disabled = true;
      try {
        status("正在创建新的克隆音色...");
        currentProfile = await createDraftProfile();
        const form = new FormData();
        form.append("reference_text", $("referenceText").value.trim());
        form.append("file", recordedBlob, sampleFilename);
        status("正在上传音频样本...");
        const sample = await fetchJson(`${API}/profiles/${currentProfile.id}/samples`, { method: "POST", body: form });
        $("generateBtn").disabled = false;
        $("saveNameBtn").disabled = false;
        $("useCurrentBtn").disabled = false;
        await refreshVoiceLibrary();
        status(`上传成功。\nprofile_id=${currentProfile.id}\nsample_id=${sample.id}\n现在可以生成测试音频，或保存并使用这个音色。`);
      } catch (error) {
        $("uploadBtn").disabled = false;
        status(`上传失败：${error.message}`);
      }
    };

    $("generateBtn").onclick = async () => {
      if (!currentProfile) { status("请先上传录音样本。"); return; }
      $("generateBtn").disabled = true;
      try {
        await generateSpeech({ profileId: currentProfile.id, text: $("testText").value, engine: "qwen", audioElement: $("generatedAudio"), label: "正在生成克隆测试音频..." });
      } catch (error) {
        status(`生成失败：${error.message}`);
      } finally {
        $("generateBtn").disabled = false;
      }
    };

    $("scriptGenerateBtn").onclick = async () => {
      $("scriptGenerateBtn").disabled = true;
      try {
        if ($("smartMixToggle").checked) {
          await generateSmartMix({
            text: $("scriptText").value,
            engine: $("engineSelect").value,
            audioElement: $("scriptAudio"),
            fallbackProfileId: $("scriptVoiceSelect").value,
          });
        } else {
          await generateSpeech({
            profileId: $("scriptVoiceSelect").value,
            text: $("scriptText").value,
            engine: $("engineSelect").value,
            audioElement: $("scriptAudio"),
            label: "正在用已有音色生成文案音频...",
            allowSplit: true,
          });
        }
      } catch (error) {
        status(`文案音频生成失败：${error.message}`);
      } finally {
        $("scriptGenerateBtn").disabled = false;
      }
    };

    $("saveNameBtn").onclick = async () => {
      try { const profile = await updateCurrentProfileName(); status(`已保存音色名称：${profile.name}`); }
      catch (error) { status(`保存失败：${error.message}`); }
    };

    $("useCurrentBtn").onclick = async () => {
      try { const profile = await updateCurrentProfileName(); await selectVoice(profile.id); }
      catch (error) { status(`选择失败：${error.message}`); }
    };

    $("useExistingBtn").onclick = async () => {
      try { await selectVoice($("scriptVoiceSelect").value); }
      catch (error) { status(`选择失败：${error.message}`); }
    };

    $("voiceFixBtn").onclick = async () => {
      $("voiceFixBtn").disabled = true;
      try {
        const version = await applyVoiceFixToLatest();
        status(`AI 修声完成。\n版本：${version.label}\n可以试听，也可以保存到指定路径。`);
      } catch (error) {
        status(`AI 修声失败：${error.message}`);
      } finally {
        $("voiceFixBtn").disabled = !latestGenerationId || !!latestCombinedPath;
      }
    };

    $("saveAudioBtn").onclick = async () => {
      const outputPath = $("outputPathInput").value.trim();
      const filename = $("outputFilenameInput").value.trim() || defaultAudioFilename();
      localStorage.setItem("voiceboxOutputPath", outputPath);
      $("saveAudioBtn").disabled = true;
      try {
        const endpoint = latestCombinedPath ? "copy-audio" : "save-audio";
        const body = latestCombinedPath
          ? { source_path: latestCombinedPath, output_path: outputPath, filename }
          : { generation_id: latestGenerationId, output_path: outputPath, filename };
        if (!latestCombinedPath && !latestGenerationId) return;
        const result = await fetchJson(`${API}/${endpoint}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        status(`音频已保存：\n${result.saved_path}`);
      } catch (error) {
        status(`保存失败：${error.message}`);
      } finally {
        $("saveAudioBtn").disabled = false;
      }
    };

    $("downloadAudioBtn").onclick = async () => {
      if (!latestAudioUrl) return;
      const filename = $("outputFilenameInput").value.trim() || defaultAudioFilename();
      const link = document.createElement("a");
      link.href = latestAudioUrl;
      link.download = filename.endsWith(".wav") ? filename : `${filename}.wav`;
      document.body.appendChild(link);
      link.click();
      link.remove();
    };

    $("refreshBtn").onclick = refreshVoiceLibrary;
    refreshVoiceLibrary();
  </script>
</body>
</html>
